<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>民航应急知识图谱生成系统</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <h1>民航应急知识图谱生成系统</h1>
      </div>
    </header>

    <main class="page-grid">
      <aside class="panel left-panel">
        <div class="panel-title">应急问题输入</div>

        <label class="field-label" for="questionInput">问题描述</label>
        <textarea id="questionInput" placeholder="请输入应急问题，例如：飞机客舱出现烟雾应如何处置？"></textarea>

        <div class="controls">
          <div class="control-card">
            <label for="topK">检索范围</label>
            <input id="topK" type="number" value="10" min="1" max="20" />
          </div>
          <div class="control-card">
            <label for="finalN">输出条数</label>
            <input id="finalN" type="number" value="3" min="1" max="10" />
          </div>
        </div>

        <button id="runBtn" class="primary-btn" type="button">开始分析</button>

        <div class="meta-stack">
          <div class="meta-card">
            <div class="meta-title">识别场景</div>
            <div id="normalizedScene" class="meta-content">暂无</div>
          </div>
          <div class="meta-card">
            <div class="meta-title">关联术语</div>
            <div id="mappedTerms" class="meta-content">暂无</div>
          </div>
          <div class="meta-card">
            <div class="meta-title">图谱摘要</div>
            <div id="graphSummary" class="meta-content">暂无</div>
          </div>
        </div>
      </aside>

      <section class="panel center-panel">
        <div class="panel-title">应急处置建议</div>
        <div id="answerBox" class="content-scroll answer-box">
          请输入问题并点击“开始分析”。
        </div>
      </section>
    </main>

    <section class="panel graph-panel">
      <div class="panel-title">
        <span>关联信息网络</span>
        <div class="toolbar">
          <button type="button" class="ghost-btn" onclick="fitGraph()">适配视图</button>
          <button type="button" class="ghost-btn" onclick="zoomIn()">放大</button>
          <button type="button" class="ghost-btn" onclick="zoomOut()">缩小</button>
        </div>
      </div>
      <div id="graphContainer"></div>
    </section>

    <section class="panel evidence-panel">
      <div class="panel-title">参考依据</div>
      <div id="evidenceBox" class="content-scroll evidence-box">
        暂无参考依据。
      </div>
    </section>
  </div>

  <script>
    const answerBoxEl = document.getElementById("answerBox");
    const evidenceBoxEl = document.getElementById("evidenceBox");
    const questionInputEl = document.getElementById("questionInput");
    const topKEl = document.getElementById("topK");
    const finalNEl = document.getElementById("finalN");
    const normalizedSceneEl = document.getElementById("normalizedScene");
    const mappedTermsEl = document.getElementById("mappedTerms");
    const graphSummaryEl = document.getElementById("graphSummary");
    const runBtn = document.getElementById("runBtn");

    let network = null;
    let graphNodes = new vis.DataSet([]);
    let graphEdges = new vis.DataSet([]);

    function renderEvidences(items) {
      evidenceBoxEl.innerHTML = "";
      if (!items || items.length === 0) {
        evidenceBoxEl.innerHTML = '<div class="empty-state">暂无参考依据。</div>';
        return;
      }

      items.forEach((item, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "evidence-card";
        wrap.innerHTML = `
          <div class="evidence-source">依据 ${idx + 1}${item.source ? " · " + item.source : ""}</div>
          <div class="evidence-text">${item.text || ""}</div>
        `;
        evidenceBoxEl.appendChild(wrap);
      });
    }

    function renderGraph(nodes, edges) {
      const container = document.getElementById("graphContainer");

      graphNodes.clear();
      graphEdges.clear();

      graphNodes.add(
        (nodes || []).map((n, i) => ({
          id: n.id || i,
          label: n.label || "节点",
          shape: "dot",
          size: 18
        }))
      );

      graphEdges.add(
        (edges || []).map((e, i) => ({
          id: i,
          from: e.from,
          to: e.to,
          arrows: "to"
        }))
      );

      if (network) network.destroy();
      network = new vis.Network(container, { nodes: graphNodes, edges: graphEdges }, {});
    }

    function mapTermsToText(value) {
      if (!value) return "暂无";
      if (Array.isArray(value)) return value.join("、");
      return String(value);
    }

    runBtn.addEventListener("click", async () => {
      const question = questionInputEl.value.trim();
      const top_k = Number(topKEl.value);
      const final_n = Number(finalNEl.value);

      if (!question) {
        alert("请输入问题");
        return;
      }

      answerBoxEl.textContent = "分析中...";

      try {
        const res = await fetch("https://civil-aviation-kg-system.onrender.com/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, top_k, final_n })
        });

        const data = await res.json();

        answerBoxEl.textContent = data.answer;
        normalizedSceneEl.textContent = data.normalized_question;
        mappedTermsEl.textContent = mapTermsToText(data.mapped_terms);
        graphSummaryEl.textContent = data.graph_summary;

        renderEvidences(data.evidences);
        renderGraph(data.graph_nodes, data.graph_edges);

      } catch (err) {
        answerBoxEl.textContent = "请求失败：" + err;
      }
    });
  </script>
</body>
</html>
